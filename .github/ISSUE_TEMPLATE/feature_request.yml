name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? Why is the current behavior insufficient?
      placeholder: I want to share markdown pages that last longer than 24 hours because I use them for project documentation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of md.page would this affect?
      options:
        - API / Worker
        - CLI (mdpage-cli)
        - MCP Server
        - VS Code Extension
        - Landing Page
        - New component
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false
